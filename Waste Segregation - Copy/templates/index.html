<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Waste Segregation Assistant</title>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>
        <span class="brand-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 7l2.2-3.8a2 2 0 0 1 3.5 0L14 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 13l-1.5 2.6a2 2 0 0 0 .8 2.7L5 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 10l1.5 2.6a2 2 0 0 1-.8 2.7L19 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 4l2 3-3 .5M20 16l-3-1 .5 3M4 14l3 1-.5-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        Waste Segregation Assistant
      </h1>
      <p>Upload an image or describe your waste item to get clear disposal guidance</p>
    </header>

    <div class="card">
      <form id="classifyForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" name="city" id="city" placeholder="Chennai" value="Chennai"/>
          </div>
          
          <div class="form-group">
            <label for="text">Describe the item (optional)</label>
            <input type="text" name="text" id="text" placeholder="e.g., banana peel, plastic bottle, phone charger"/>
          </div>
          
          <div class="form-group full-width">
            <label>Upload an image (optional)</label>
            <div id="drop" class="drop">
              Drag & drop an image here or click to choose
            </div>
            <input type="file" name="image" id="image" accept="image/*" hidden/>
          </div>
        </div>

        <button type="submit" class="btn">Classify Waste Item</button>
      </form>
    </div>

    <div id="result" class="hidden"></div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
